<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Sales · ERP</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
    <link rel="stylesheet" th:href="@{/css/sales.css}"/>
</head>
<body>

<div class="app-shell">

    <div th:replace="~{dashboard/fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{dashboard/fragments/sidebar :: sidebar-overlay}"></div>

    <div class="main-area" id="mainArea">

        <div th:replace="~{dashboard/fragments/topbar :: topbar}"></div>

        <main class="page-content">

            <!-- ALERTS -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- PAGE HEADER -->
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
                <div>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-1" style="font-size:0.8rem;">
                            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                            <li class="breadcrumb-item active">Sales</li>
                        </ol>
                    </nav>
                    <h1 class="page-header-title">
                        <i class="bi bi-receipt-cutoff me-2" style="color:#2563eb;"></i>
                        Sales Management
                    </h1>
                </div>
                <a th:href="@{/sales/add}"
                   class="btn btn-primary"
                   sec:authorize="hasAnyRole('SUPER_ADMIN','BUSINESS_OWNER')">
                    <i class="bi bi-plus-circle me-1"></i>New Sale
                </a>
            </div>

            <!-- FILTER BAR -->
            <div class="d-flex gap-2 flex-wrap mb-3">
                <input type="text"
                       id="searchInput"
                       class="form-control"
                       style="max-width:260px;"
                       placeholder="Search invoice, customer…"
                       oninput="filterTable()"/>
                <select id="statusFilter" class="form-select" style="max-width:160px;" onchange="filterTable()">
                    <option value="">All Status</option>
                    <option value="DRAFT">Draft</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="CANCELLED">Cancelled</option>
                    <option value="RETURNED">Returned</option>
                </select>
                <input type="date" id="dateFrom" class="form-control" style="max-width:160px;" onchange="filterTable()"/>
                <input type="date" id="dateTo"   class="form-control" style="max-width:160px;" onchange="filterTable()"/>
                <button class="btn btn-outline-secondary btn-sm" onclick="resetFilters()">
                    <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
                </button>
            </div>

            <!-- TABLE CARD -->
            <div class="card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="salesTable">
                        <thead class="table-light">
                        <tr>
                            <th style="width:40px;">#</th>
                            <th>Invoice</th>
                            <th>Customer</th>
                            <th>Date</th>
                            <th class="text-end">Subtotal</th>
                            <th class="text-end">Discount</th>
                            <th class="text-end">Grand Total</th>
                            <th class="text-end">Paid</th>
                            <th class="text-end">Due</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody id="salesBody">

                        <!-- Empty State -->
                        <tr th:if="${#lists.isEmpty(sales)}" id="emptyRow">
                            <td colspan="11" class="text-center py-5 text-muted">
                                <i class="bi bi-cart-x d-block mb-2" style="font-size:2.5rem;opacity:0.2;"></i>
                                <p class="mb-0">No sales found</p>
                            </td>
                        </tr>

                        <!-- Data Rows -->
                        <tr th:each="s, iStat : ${sales}"
                            th:data-status="${s.status}"
                            th:data-date="${s.saleDate}">

                            <td class="text-muted" th:text="${iStat.index + 1}">1</td>

                      <td>
    <a th:href="@{'/sales/' + ${s.id}}"
       th:text="${s.invoiceNo}"
       class="fw-semibold text-primary text-decoration-none"></a>
</td>

                            <td th:text="${s.customerName != null ? s.customerName : '—'}">—</td>

                            <td th:text="${#temporals.format(s.saleDate,'dd MMM yyyy')}">—</td>

                            <td class="text-end">
                                ৳<span th:text="${#numbers.formatDecimal(s.subtotal,1,'COMMA',2,'POINT')}">0.00</span>
                            </td>

                            <td class="text-end text-danger">
                                -৳<span th:text="${#numbers.formatDecimal(s.totalDiscount,1,'COMMA',2,'POINT')}">0.00</span>
                            </td>

                            <td class="text-end fw-bold">
                                ৳<span th:text="${#numbers.formatDecimal(s.grandTotal,1,'COMMA',2,'POINT')}">0.00</span>
                            </td>

                            <td class="text-end text-success">
                                ৳<span th:text="${#numbers.formatDecimal(s.paidAmount,1,'COMMA',2,'POINT')}">0.00</span>
                            </td>

                            <td class="text-end">
                                <span th:class="${s.dueAmount != null and s.dueAmount.compareTo(T(java.math.BigDecimal).ZERO) > 0} ? 'text-danger fw-semibold' : 'text-muted'">
                                    ৳<span th:text="${#numbers.formatDecimal(s.dueAmount,1,'COMMA',2,'POINT')}">0.00</span>
                                </span>
                            </td>

                            <td>
                                <span th:class="'badge ' + (${s.status.name() == 'COMPLETED'} ? 'bg-success' : (${s.status.name() == 'CANCELLED'} ? 'bg-danger' : (${s.status.name() == 'RETURNED'} ? 'bg-warning text-dark' : 'bg-primary')))"
                                      th:text="${s.status}"></span>
                            </td>

                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{'/sales/' + ${s.id}}"
                                       class="btn btn-outline-primary btn-sm"
                                       title="View">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{'/sales/' + ${s.id} + '/edit'}"
                                       th:if="${s.status.name() == 'DRAFT'}"
                                       class="btn btn-outline-secondary btn-sm"
                                       sec:authorize="hasAnyRole('SUPER_ADMIN','BUSINESS_OWNER')"
                                       title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:if="${s.status.name() != 'CANCELLED'}"
                                          th:action="@{'/sales/' + ${s.id} + '/cancel'}"
                                          method="post" style="display:inline;"
                                          sec:authorize="hasAnyRole('SUPER_ADMIN','BUSINESS_OWNER')"
                                          onsubmit="return confirm('এই সেলটি cancel করবেন?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-outline-danger btn-sm" title="Cancel">
                                            <i class="bi bi-x-circle"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>

                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- TABLE FOOTER -->
                <div class="card-footer text-muted d-flex justify-content-between align-items-center"
                     style="font-size:0.8rem;">
                    <span id="rowCount">Loading…</span>
                    <span th:text="'Total: ' + ${#lists.size(sales)} + ' records'"></span>
                </div>
            </div>

        </main>
    </div>
    <!-- end main-area -->

</div>
<!-- end app-shell -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function filterTable() {
        const q      = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value.toUpperCase();
        const from   = document.getElementById('dateFrom').value;
        const to     = document.getElementById('dateTo').value;
        const rows   = document.querySelectorAll('#salesBody tr[data-status]');
        let visible  = 0;
        rows.forEach(row => {
            const text    = row.innerText.toLowerCase();
            const rStatus = row.dataset.status || '';
            const rDate   = row.dataset.date   || '';
            const matchQ  = !q      || text.includes(q);
            const matchS  = !status || rStatus === status;
            const matchF  = !from   || rDate >= from;
            const matchT  = !to     || rDate <= to;
            const show    = matchQ && matchS && matchF && matchT;
            row.style.display = show ? '' : 'none';
            if (show) visible++;
        });
        document.getElementById('rowCount').textContent =
            `Showing ${visible} of ${rows.length} records`;
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('statusFilter').value = '';
        document.getElementById('dateFrom').value = '';
        document.getElementById('dateTo').value = '';
        filterTable();
    }

    filterTable();
</script>

</body>
</html>
