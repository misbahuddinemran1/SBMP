<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to eLoan SaaS - Smart Business Management Platform">
  <title>Login - eLoan SaaS</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
        --primary-blue: #3B82F6;
        --primary-blue-light: #60A5FA;
        --primary-blue-dark: #2563EB;
        --secondary-blue: #0EA5E9;
        --accent-cyan: #06B6D4;
        --text-dark: #0F172A;
        --text-muted: #64748B;
        --bg-light: #F8FAFC;
        --bg-white: #FFFFFF;
        --border-light: #E2E8F0;
        --success-green: #10B981;
        --error-red: #EF4444;
        --shadow-sm: 0 2px 8px rgba(59, 130, 246, 0.08);
        --shadow-md: 0 4px 24px rgba(59, 130, 246, 0.12);
        --shadow-lg: 0 8px 40px rgba(59, 130, 246, 0.16);
        --gradient-primary: linear-gradient(135deg, #3B82F6 0%, #0EA5E9 100%);
        --gradient-light: linear-gradient(135deg, #EFF6FF 0%, #F0F9FF 100%);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text-dark);
        line-height: 1.6;
        background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 50%, #F0F9FF 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        position: relative;
        overflow: hidden;
    }

    body::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -20%;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
        border-radius: 50%;
        animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.8; }
    }

    h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        color: var(--text-dark);
    }

    .auth-container {
        width: 100%;
        max-width: 480px;
        position: relative;
        z-index: 2;
        animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 3rem 2.5rem;
        box-shadow: var(--shadow-lg);
        border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .brand-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .brand-name {
        font-family: 'Outfit', sans-serif;
        font-size: 2rem;
        font-weight: 800;
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
        margin-bottom: 0.5rem;
    }

    .brand-tagline {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-title {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
    }

    .auth-subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        font-weight: 600;
        color: var(--text-dark);
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
    }

    .form-control {
        border: 2px solid var(--border-light);
        border-radius: 12px;
        padding: 0.875rem 1rem;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        background: var(--bg-white);
    }

    .form-control:focus {
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        outline: none;
    }

    .form-control.is-invalid {
        border-color: var(--error-red);
    }

    .form-control.is-invalid:focus {
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }

    .form-control.is-valid {
        border-color: var(--success-green);
    }

    .form-control.is-valid:focus {
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .invalid-feedback,
    .valid-feedback {
        font-size: 0.85rem;
        margin-top: 0.5rem;
    }

    .password-wrapper {
        position: relative;
    }

    .password-toggle {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0.25rem;
        transition: color 0.3s ease;
    }

    .password-toggle:hover {
        color: var(--primary-blue);
    }

    .form-check {
        margin-bottom: 1.5rem;
    }

    .form-check-input {
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid var(--border-light);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .form-check-input:checked {
        background-color: var(--primary-blue);
        border-color: var(--primary-blue);
    }

    .form-check-input:focus {
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .form-check-label {
        margin-left: 0.5rem;
        cursor: pointer;
        color: var(--text-dark);
    }

    .forgot-password {
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: color 0.3s ease;
    }

    .forgot-password:hover {
        color: var(--primary-blue-dark);
        text-decoration: underline;
    }

    .btn-auth {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 12px;
        border: none;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .btn-primary-auth {
        background: var(--gradient-primary);
        color: white;
        box-shadow: var(--shadow-md);
    }

    .btn-primary-auth:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
    }

    .btn-primary-auth:active:not(:disabled) {
        transform: translateY(0);
    }

    .btn-primary-auth:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .btn-loading {
        position: relative;
        color: transparent;
    }

    .btn-loading::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .btn-secondary-auth {
        background: transparent;
        color: var(--primary-blue);
        border: 2px solid var(--primary-blue);
        margin-top: 1rem;
    }

    .btn-secondary-auth:hover {
        background: var(--primary-blue);
        color: white;
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 2rem 0;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid var(--border-light);
    }

    .divider span {
        padding: 0 1rem;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .auth-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border-light);
    }

    .auth-footer p {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin: 0;
    }

    .auth-footer a {
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    .back-home {
        text-align: center;
        margin-top: 1.5rem;
    }

    .back-home a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
    }

    .back-home a:hover {
        color: var(--primary-blue);
    }

    .back-home i {
        margin-right: 0.5rem;
    }

    /* Responsive Design */
    @media (max-width: 576px) {
        .auth-card {
            padding: 2rem 1.5rem;
        }

        .brand-name {
            font-size: 1.75rem;
        }

        .auth-title {
            font-size: 1.5rem;
        }
    }

    /* Input Icons */
    .input-icon-wrapper {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 1.1rem;
    }

    .input-icon-wrapper .form-control {
        padding-left: 2.75rem;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <!-- Brand Logo -->
    <div class="brand-logo">
      <h1 class="brand-name">eLoan SaaS</h1>
      <p class="brand-tagline">Smart Business Management</p>
    </div>

    <!-- Auth Header -->
    <div class="auth-header">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account to continue</p>
    </div>

    <!-- Login Form -->

    <form
            id="loginForm"
            th:action="@{/login}"
            method="post"
            novalidate
    >
      <!-- Email or Phone -->
      <div class="form-group">
        <label for="emailPhone" class="form-label">Email or Phone Number</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-envelope input-icon"></i>
          <input
                  type="text"
                  class="form-control"
                  id="emailPhone"
                  name="username"
                  placeholder="Enter your email or phone number"
                  required
          >
        </div>
        <div class="invalid-feedback">
          Please enter a valid email or phone number
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-icon-wrapper password-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
                  required
                  minlength="6"
          >
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="toggleIcon"></i>
          </button>
        </div>
        <div class="invalid-feedback">
          Password must be at least 6 characters
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
          <label class="form-check-label" for="rememberMe">
            Remember me
          </label>
        </div>
        <a href="#forgot-password" class="forgot-password">Forgot Password?</a>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn btn-primary-auth btn-auth" id="loginBtn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>

      <!-- Divider -->
      <div class="divider">
        <span>or</span>
      </div>

      <!-- Create Account Button -->
      <button type="button" class="btn btn-secondary-auth btn-auth" onclick="window.location.href='/register'">
        <i class="bi bi-person-plus me-2"></i>Create New Account
      </button>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      <p>Don't have an account? <a href="register.html">Sign up now</a></p>
    </div>
  </div>

  <!-- Back to Home -->
  <div class="back-home">
    <a href="/">
      <i class="bi bi-arrow-left"></i>Back to Home
    </a>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Password Toggle
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const toggleIcon = document.getElementById('toggleIcon');

  togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);

      if (type === 'password') {
          toggleIcon.classList.remove('bi-eye-slash');
          toggleIcon.classList.add('bi-eye');
      } else {
          toggleIcon.classList.remove('bi-eye');
          toggleIcon.classList.add('bi-eye-slash');
      }
  });

  // Form Validation
  const loginForm = document.getElementById('loginForm');
  const emailPhoneInput = document.getElementById('emailPhone');
  const passwordInputField = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');

  // Email/Phone validation
  function validateEmailPhone(value) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^[\d\s\-\+\(\)]{10,}$/;
      return emailRegex.test(value) || phoneRegex.test(value);
  }

  // Real-time validation
  emailPhoneInput.addEventListener('blur', function() {
      if (this.value.trim() === '') {
          this.classList.remove('is-valid', 'is-invalid');
      } else if (validateEmailPhone(this.value)) {
          this.classList.remove('is-invalid');
          this.classList.add('is-valid');
      } else {
          this.classList.remove('is-valid');
          this.classList.add('is-invalid');
      }
  });

  passwordInputField.addEventListener('blur', function() {
      if (this.value.trim() === '') {
          this.classList.remove('is-valid', 'is-invalid');
      } else if (this.value.length >= 6) {
          this.classList.remove('is-invalid');
          this.classList.add('is-valid');
      } else {
          this.classList.remove('is-valid');
          this.classList.add('is-invalid');
      }
  });

  // Form Submit
  loginForm.addEventListener('submit', function(e) {


      let isValid = true;

      // Validate email/phone
      if (!validateEmailPhone(emailPhoneInput.value)) {
          emailPhoneInput.classList.add('is-invalid');
          emailPhoneInput.classList.remove('is-valid');
          isValid = false;
      } else {
          emailPhoneInput.classList.remove('is-invalid');
          emailPhoneInput.classList.add('is-valid');
      }

      // Validate password
      if (passwordInputField.value.length < 6) {
          passwordInputField.classList.add('is-invalid');
          passwordInputField.classList.remove('is-valid');
          isValid = false;
      } else {
          passwordInputField.classList.remove('is-invalid');
          passwordInputField.classList.add('is-valid');
      }

      if (isValid) {
          // Show loading state
          loginBtn.classList.add('btn-loading');
          loginBtn.disabled = true;


      }
  });

  // Clear validation on input
  emailPhoneInput.addEventListener('input', function() {
      if (this.classList.contains('is-invalid') || this.classList.contains('is-valid')) {
          this.classList.remove('is-invalid', 'is-valid');
      }
  });

  passwordInputField.addEventListener('input', function() {
      if (this.classList.contains('is-invalid') || this.classList.contains('is-valid')) {
          this.classList.remove('is-invalid', 'is-valid');
      }
  });
</script>

</body>
</html>
