<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

  <meta charset="UTF-8"/>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title th:text="${pageTitle} + ' — eLoan SaaS'">
    Product Form
  </title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet"
        th:href="@{/css/dashboard.css}">

  <link rel="stylesheet"
        th:href="@{/css/product.css}">

</head>

<body class="eloan-body">

<!-- Sidebar -->
<div th:replace="dashboard/fragments/sidebar :: sidebar"></div>

<!-- Main Wrapper -->
<div class="eloan-main-wrapper">

  <!-- Topbar -->
  <div th:replace="dashboard/fragments/topbar :: topbar"></div>

  <!-- Content -->
  <main class="eloan-content">

    <!-- Header -->
    <div class="page-header mb-4">

      <div class="d-flex flex-column flex-md-row
                        align-items-md-center
                        justify-content-between
                        gap-3">

        <div>

          <nav aria-label="breadcrumb">

            <ol class="breadcrumb breadcrumb-eloan mb-1">

              <li class="breadcrumb-item">

                <a th:href="@{/dashboard}">
                  <i class="bi bi-house-door me-1"></i>
                  Home
                </a>

              </li>

              <li class="breadcrumb-item">

                <a th:href="@{/inventory}">
                  Inventory
                </a>

              </li>

              <li class="breadcrumb-item">

                <a th:href="@{/inventory/product}">
                  Products
                </a>

              </li>

              <li class="breadcrumb-item active"
                  th:text="${pageTitle}">

                Product Form

              </li>

            </ol>

          </nav>

          <h1 class="page-title mb-1"
              th:text="${pageTitle}">

            Product Form

          </h1>

          <p class="page-subtitle mb-0"
             th:text="${isEdit}
                       ? 'Update product information and inventory settings'
                       : 'Fill in the details to add a new product'">

            Product subtitle

          </p>

        </div>

        <a th:href="@{/inventory/product}"
           class="btn btn-eloan-back">

          <i class="bi bi-arrow-left me-2"></i>
          Back to Products

        </a>

      </div>

    </div>

    <!-- Form -->
    <form th:action="${isEdit}
                ? @{/inventory/product/{id}/update(id=${productId})}
                : @{/inventory/product/save}"
          th:object="${product}"
          method="post"
          id="productForm"
          novalidate>

      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}"/>

      <div class="row g-4">

        <!-- LEFT -->
        <div class="col-12 col-xl-8">

          <!-- BASIC -->
          <div class="eloan-card mb-4">

            <div class="eloan-card__header">

                            <span class="eloan-card__title">

                                <i class="bi bi-info-circle me-2"></i>
                                Basic Information

                            </span>

            </div>

            <div class="eloan-card__body">

              <div class="row g-3">

                <!-- NAME -->
                <div class="col-12">

                  <label for="name"
                         class="form-label-eloan">

                    Product Name
                    <span class="required-star">*</span>

                  </label>

                  <input type="text"
                         id="name"
                         class="form-control form-control-eloan"
                         th:field="*{name}"
                         th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                         placeholder="Enter product name"/>

                  <div class="invalid-feedback"
                       th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}">

                    Error

                  </div>

                </div>

                <!-- SKU -->
                <div class="col-md-6">

                  <label for="sku"
                         class="form-label-eloan">

                    SKU

                  </label>

                  <input type="text"
                         id="sku"
                         class="form-control form-control-eloan"
                         th:field="*{sku}"
                         placeholder="e.g. PROD-001"/>

                </div>

                <!-- BARCODE -->
                <div class="col-md-6">

                  <label for="barcode"
                         class="form-label-eloan">

                    Barcode

                  </label>

                  <input type="text"
                         id="barcode"
                         class="form-control form-control-eloan"
                         th:field="*{barcode}"
                         placeholder="Barcode"/>

                </div>

                <!-- CATEGORY -->
                <div class="col-md-6">

                  <label for="categoryId"
                         class="form-label-eloan">

                    Category
                    <span class="required-star">*</span>

                  </label>

                  <select id="categoryId"
                          class="form-select form-control-eloan"
                          th:field="*{categoryId}">

                    <option value="">
                      Select Category
                    </option>

                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}">

                      Category

                    </option>

                  </select>

                  <div class="invalid-feedback"
                       th:if="${#fields.hasErrors('categoryId')}"
                       th:errors="*{categoryId}">

                    Error

                  </div>

                </div>

                <!-- UNIT -->
                <div class="col-md-6">

                  <label for="unit"
                         class="form-label-eloan">

                    Unit

                  </label>

                  <input type="text"
                         id="unit"
                         class="form-control form-control-eloan"
                         th:field="*{unit}"
                         placeholder="pcs / kg / box"/>

                </div>

                <!-- DESCRIPTION -->
                <div class="col-12">

                  <label for="description"
                         class="form-label-eloan">

                    Description

                  </label>

                  <textarea id="description"
                            rows="4"
                            class="form-control form-control-eloan textarea-eloan"
                            th:field="*{description}"
                            placeholder="Product description"></textarea>

                </div>

              </div>

            </div>

          </div>

          <!-- PRICING -->
          <div class="eloan-card mb-4">

            <div class="eloan-card__header">

                            <span class="eloan-card__title">

                                <i class="bi bi-cash-stack me-2"></i>
                                Pricing

                            </span>

            </div>

            <div class="eloan-card__body">

              <div class="row g-3">

                <!-- PURCHASE -->
                <div class="col-md-6">

                  <label for="purchasePrice"
                         class="form-label-eloan">

                    Purchase Price

                  </label>

                  <input type="number"
                         step="0.01"
                         min="0"
                         id="purchasePrice"
                         class="form-control form-control-eloan"
                         th:field="*{purchasePrice}"/>

                </div>

                <!-- SELL -->
                <div class="col-md-6">

                  <label for="sellingPrice"
                         class="form-label-eloan">

                    Selling Price

                  </label>

                  <input type="number"
                         step="0.01"
                         min="0"
                         id="sellingPrice"
                         class="form-control form-control-eloan"
                         th:field="*{sellingPrice}"/>

                </div>

              </div>

            </div>

          </div>

          <!-- INVENTORY -->
          <div class="eloan-card mb-4">

            <div class="eloan-card__header">

                            <span class="eloan-card__title">

                                <i class="bi bi-box-seam me-2"></i>
                                Inventory

                            </span>

            </div>

            <div class="eloan-card__body">

              <div class="row g-3">

                <!-- STOCK -->
                <div class="col-md-6">

                  <label for="stockQuantity"
                         class="form-label-eloan">

                    Stock Quantity

                  </label>

                  <input type="number"
                         min="0"
                         id="stockQuantity"
                         class="form-control form-control-eloan"
                         th:field="*{stockQuantity}"/>

                </div>

                <!-- ALERT -->
                <div class="col-md-6">

                  <label for="minimumStockAlert"
                         class="form-label-eloan">

                    Minimum Stock Alert

                  </label>

                  <input type="number"
                         min="0"
                         id="minimumStockAlert"
                         class="form-control form-control-eloan"
                         th:field="*{minimumStockAlert}"/>

                </div>

              </div>

            </div>

          </div>

        </div>

        <!-- RIGHT -->
        <div class="col-12 col-xl-4">

          <!-- STATUS -->
          <div class="eloan-card mb-4">

            <div class="eloan-card__header">

                            <span class="eloan-card__title">

                                <i class="bi bi-toggle-on me-2"></i>
                                Status

                            </span>

            </div>

            <div class="eloan-card__body">

              <div class="form-check form-switch">

                <input class="form-check-input"
                       type="checkbox"
                       id="active"
                       th:field="*{active}"/>

                <label class="form-check-label"
                       for="active">

                  Product Active

                </label>

              </div>

            </div>

          </div>

          <!-- ACTIONS -->
          <div class="eloan-card">

            <div class="eloan-card__body">

              <button type="submit"
                      class="btn btn-eloan-primary w-100 mb-2"
                      id="saveBtn">

                <i class="bi bi-floppy me-2"></i>

                <span th:text="${isEdit}
                                ? 'Update Product'
                                : 'Save Product'">

                                    Save Product

                                </span>

              </button>

              <a th:href="@{/inventory/product}"
                 class="btn btn-eloan-cancel w-100">

                <i class="bi bi-x-lg me-2"></i>
                Cancel

              </a>

            </div>

          </div>

        </div>

      </div>

    </form>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/product.js}"></script>
<script th:src="@{/js/dashboard.js}"></script>

</body>
</html>
