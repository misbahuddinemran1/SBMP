<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">

<!--/*
    eLoan SaaS — sidebar.html
    Thymeleaf Fragment: sidebar
*/-->

<body>

<!-- =============================================
     SIDEBAR FRAGMENT
     ============================================= -->
<aside th:fragment="sidebar"
       class="sidebar"
       id="appSidebar"
       aria-label="Main navigation">

    <!-- =============================================
         LOGO
         ============================================= -->
    <div class="sidebar-logo">

        <div class="sidebar-logo-icon">
            <i class="bi bi-currency-exchange"></i>
        </div>

        <span class="sidebar-brand-name">
            e<span>Loan</span> SaaS
        </span>

    </div>

    <!-- =============================================
         BUSINESS INFO
         ============================================= -->
    <div class="sidebar-business">

        <div class="sidebar-business-label">
            Active Business
        </div>

        <div class="sidebar-business-name">
            <i class="bi bi-building me-1"
               style="font-size:0.75rem;"></i>

            <span th:text="${businessName ?: 'My Business Ltd.'}">
                My Business Ltd.
            </span>
        </div>

    </div>

    <!-- =============================================
         SIDEBAR NAVIGATION
         ============================================= -->
    <nav class="sidebar-nav" role="navigation">

        <!-- =============================================
             MAIN SECTION
             ============================================= -->
        <p class="nav-section-label">Main</p>

        <ul class="nav flex-column"
            style="list-style:none;padding:0;">

            <!-- Dashboard -->
            <li class="nav-item">

                <a th:href="@{/dashboard}"
                   th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-grid-1x2"></i>

                    <span>Dashboard</span>

                </a>

            </li>

            <!-- Inventory -->
            <li class="nav-item"
                sec:authorize="hasAnyRole('SUPER_ADMIN','BUSINESS_OWNER')">

                <a th:href="@{/inventory/category}"
                   th:classappend="${activePage == 'inventory'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-boxes"></i>

                    <span>Inventory</span>

                </a>

            </li>

            <!-- Products -->
            <li class="nav-item">

                <a th:href="@{/products}"
                   th:classappend="${activePage == 'products'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-bag"></i>

                    <span>Products</span>

                </a>

            </li>

        </ul>

        <!-- =============================================
             FINANCE SECTION
             ============================================= -->
        <p class="nav-section-label">Finance</p>

        <ul class="nav flex-column"
            style="list-style:none;padding:0;">

            <!-- Sales -->
            <li class="nav-item">

                <a th:href="@{/sales}"
                   th:classappend="${activePage == 'sales'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-receipt"></i>

                    <span>Sales</span>

                </a>

            </li>

            <!-- Expenses -->
            <li class="nav-item">

                <a th:href="@{/expenses}"
                   th:classappend="${activePage == 'expenses'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-credit-card"></i>

                    <span>Expenses</span>

                </a>

            </li>

            <!-- Due Management -->
            <li class="nav-item">

                <a th:href="@{/due-management}"
                   th:classappend="${activePage == 'due-management'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-exclamation-circle"></i>

                    <span>Due Management</span>

                    <!-- Dynamic Badge -->
                    <span th:if="${dueCount != null and dueCount > 0}"
                          class="nav-badge"
                          th:text="${dueCount}">
                        3
                    </span>

                </a>

            </li>

        </ul>

        <!-- =============================================
             ANALYTICS SECTION
             ============================================= -->
        <p class="nav-section-label">Analytics</p>

        <ul class="nav flex-column"
            style="list-style:none;padding:0;">

            <!-- Reports -->
            <li class="nav-item">

                <a th:href="@{/reports}"
                   th:classappend="${activePage == 'reports'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-bar-chart-line"></i>

                    <span>Reports</span>

                </a>

            </li>

        </ul>

        <!-- =============================================
             ACCOUNT SECTION
             ============================================= -->
        <p class="nav-section-label">Account</p>

        <ul class="nav flex-column"
            style="list-style:none;padding:0;">

            <!-- Subscription -->
            <li class="nav-item">

                <a th:href="@{/subscription}"
                   th:classappend="${activePage == 'subscription'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-star"></i>

                    <span>Subscription</span>

                </a>

            </li>

            <!-- Settings -->
            <li class="nav-item">

                <a th:href="@{/settings}"
                   th:classappend="${activePage == 'settings'} ? 'active' : ''"
                   class="nav-link">

                    <i class="bi bi-gear"></i>

                    <span>Settings</span>

                </a>

            </li>

        </ul>

    </nav>

    <!-- =============================================
         SIDEBAR FOOTER
         ============================================= -->
    <div class="sidebar-footer">

        <a th:href="@{/logout}"
           class="nav-link">

            <i class="bi bi-box-arrow-left"></i>

            <span>Logout</span>

        </a>

    </div>

</aside>

<!-- =============================================
     MOBILE OVERLAY
     ============================================= -->
<div th:fragment="sidebar-overlay"
     class="sidebar-overlay"
     id="sidebarOverlay"></div>

</body>
</html>
